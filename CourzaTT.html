<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CourzaTT — Discover programmes across Trinidad &amp; Tobago</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script src="supabase-loader.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="page-home.jsx"></script>
<script type="text/babel" src="page-others.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;
const { Nav, Footer, Home } = window.CourzaPages;
const { Discover, Institutions, CourseDetail, InstitutionDetail, ListInstitution } = window.CourzaPages;
const { TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakSelect, TweakColor, TweakToggle } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "accent": "#E8A33D",
  "primary": "#1F5F4A",
  "showCompass": true,
  "showGrain": true
}/*EDITMODE-END*/;

function App() {
  const [page, setPage] = useState('home');
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    (window.CourzaDataReady || Promise.resolve()).then(() => setReady(true));
  }, []);

  useEffect(() => { window.scrollTo(0, 0); }, [page]);

  // Apply tweaks to document
  useEffect(() => {
    document.documentElement.setAttribute('data-density', tweaks.density);
    document.documentElement.style.setProperty('--amber', tweaks.accent);
    document.documentElement.style.setProperty('--emerald', tweaks.primary);
    document.body.style.setProperty('--show-grain', tweaks.showGrain ? '1' : '0');
    const grainStyle = document.getElementById('grain-toggle');
    if (!grainStyle) {
      const s = document.createElement('style');
      s.id = 'grain-toggle';
      document.head.appendChild(s);
    }
    document.getElementById('grain-toggle').textContent = tweaks.showGrain ? '' : 'body::before { display: none !important; }';
  }, [tweaks]);

  if (!ready) return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--paper)' }}>
      <div style={{ textAlign: 'center' }}>
        <div className="rotate-slow" style={{ width: 48, height: 48, margin: '0 auto 20px', borderRadius: '50%', border: '2px solid var(--rule-strong)', borderTopColor: 'var(--emerald)', display: 'inline-block' }}/>
        <p className="mono muted" style={{ fontSize: 12, letterSpacing: '0.15em' }}>LOADING PROGRAMMES…</p>
      </div>
    </div>
  );

  // Activate page based on string id (supports "course:id" and "institution:id")
  let pageEl;
  const activeNav = page.startsWith('course:') ? 'discover'
                  : page.startsWith('institution:') ? 'institutions'
                  : page;

  if (page === 'home') pageEl = <Home setPage={setPage}/>;
  else if (page === 'discover') pageEl = <Discover setPage={setPage} density={tweaks.density}/>;
  else if (page === 'institutions') pageEl = <Institutions setPage={setPage}/>;
  else if (page === 'list') pageEl = <ListInstitution/>;
  else if (page.startsWith('course:')) pageEl = <CourseDetail courseId={page.slice(7)} setPage={setPage}/>;
  else if (page.startsWith('institution:')) pageEl = <InstitutionDetail instId={page.slice(12)} setPage={setPage}/>;
  else pageEl = <Home setPage={setPage}/>;

  return (
    <div data-screen-label={page}>
      <Nav activePage={activeNav} setPage={setPage}/>
      <main key={page}>{pageEl}</main>
      <Footer setPage={setPage}/>

      <TweaksPanel title="CourzaTT Tweaks">
        <TweakSection title="Density">
          <TweakRadio
            value={tweaks.density}
            onChange={(v) => setTweak('density', v)}
            options={[
              { value: 'compact', label: 'Compact' },
              { value: 'cozy', label: 'Cozy' },
              { value: 'comfortable', label: 'Comfortable' },
              { value: 'spacious', label: 'Spacious' }
            ]}
          />
        </TweakSection>
        <TweakSection title="Accent (spark)">
          <TweakColor value={tweaks.accent} onChange={(v) => setTweak('accent', v)} swatches={['#E8A33D', '#D4FF5E', '#E84D3D', '#3DA0E8', '#FFD93D']}/>
        </TweakSection>
        <TweakSection title="Primary (emerald)">
          <TweakColor value={tweaks.primary} onChange={(v) => setTweak('primary', v)} swatches={['#1F5F4A', '#0E1A17', '#3D5A80', '#7C3F58', '#2D4F2D']}/>
        </TweakSection>
        <TweakSection title="Atmosphere">
          <TweakToggle label="Paper grain" value={tweaks.showGrain} onChange={(v) => setTweak('showGrain', v)}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
