<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js?v=5"></script>
<script type="text/babel" src="components.jsx?v=5"></script>
<script type="text/babel" src="page-home.jsx?v=5"></script>
<script type="text/babel" src="page-others.jsx?v=5"></script>
<script type="text/babel" src="tweaks-panel.jsx?v=5"></script>
<script type="text/babel">
const { useState, useEffect } = React;
const { Nav, Footer, Home } = window.CourzaPages;
const { Discover, Institutions, CourseDetail, InstitutionDetail, ListInstitution, ContactPage, PrivacyPage, OnlineGuides } = window.CourzaPages;
const { TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakSelect, TweakColor, TweakToggle } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "accent": "#E8A33D",
  "primary": "#1F5F4A",
  "showCompass": true,
  "showGrain": true
}/*EDITMODE-END*/;

function App() {
  const [page, setPage] = useState('home');
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    (window.CourzaDataReady || Promise.resolve()).then(() => setReady(true));
  }, []);

  useEffect(() => { window.scrollTo(0, 0); }, [page]);

  useEffect(() => {
    document.documentElement.setAttribute('data-density', tweaks.density);
    document.documentElement.style.setProperty('--amber', tweaks.accent);
    document.documentElement.style.setProperty('--emerald', tweaks.primary);
    document.body.style.setProperty('--show-grain', tweaks.showGrain ? '1' : '0');
    const grainStyle = document.getElementById('grain-toggle');
    if (!grainStyle) {
      const s = document.createElement('style');
      s.id = 'grain-toggle';
      document.head.appendChild(s);
    }
    document.getElementById('grain-toggle').textContent = tweaks.showGrain ? '' : 'body::before { display: none !important; }';
  }, [tweaks]);

  if (!ready) return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--paper)' }}>
      <div style={{ textAlign: 'center' }}>
        <div className="rotate-slow" style={{ width: 48, height: 48, margin: '0 auto 20px', borderRadius: '50%', border: '2px solid var(--rule-strong)', borderTopColor: 'var(--emerald)', display: 'inline-block' }}/>
        <p className="mono muted" style={{ fontSize: 12, letterSpacing: '0.15em' }}>LOADING PROGRAMMES…</p>
      </div>
    </div>
  );

  let pageEl;
  const activeNav = page.startsWith('course:') ? 'discover'
                  : page.startsWith('institution:') ? 'institutions'
                  : page.startsWith('discover:') ? 'discover'
                  : page === 'guides' ? 'guides'
                  : page;

  if (page === 'home') pageEl = <Home setPage={setPage}/>;
  else if (page === 'discover') pageEl = <Discover setPage={setPage} density={tweaks.density}/>;
  else if (page.startsWith('discover:search:')) pageEl = <Discover setPage={setPage} density={tweaks.density} initialSearch={page.slice(16)}/>;
  else if (page.startsWith('discover:')) pageEl = <Discover setPage={setPage} density={tweaks.density} initialCat={page.slice(9)}/>;
  else if (page === 'institutions') pageEl = <Institutions setPage={setPage}/>;
  else if (page === 'list') pageEl = <ListInstitution setPage={setPage}/>;
  else if (page === 'contact' || page.startsWith('contact:')) {
    const parts = page.split(':');
    const subjectMap = { 'partnership': 'Partnership & advertising' };
    pageEl = <ContactPage setPage={setPage} initialSubject={subjectMap[parts[1]] || parts[1] || ''} initialNote={parts[2] ? `I'm interested in the ${parts[2]}.` : ''}/>;
  }
  else if (page === 'privacy') pageEl = <PrivacyPage setPage={setPage}/>;
  else if (page === 'guides') pageEl = <OnlineGuides setPage={setPage}/>;
  else if (page.startsWith('course:')) pageEl = <CourseDetail courseId={page.slice(7)} setPage={setPage}/>;
  else if (page.startsWith('institution:')) pageEl = <InstitutionDetail instId={page.slice(12)} setPage={setPage}/>;
  else pageEl = <Home setPage={setPage}/>;

  return (
    <div>
      <Nav activePage={activeNav} setPage={setPage}/>
      <main key={page}>{pageEl}</main>
      <Footer setPage={setPage}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
